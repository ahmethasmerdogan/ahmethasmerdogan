<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200" width="1680" height="400" role="img" aria-label="Ahmet Erdoğan — full-stack engineer and security researcher">
<defs>
<linearGradient id="rule" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00ff9f"/><stop offset="1" stop-color="#00ff9f" stop-opacity="0"/></linearGradient>
<radialGradient id="halo" cx="30%" cy="52%" r="60%"><stop offset="0" stop-color="#0f1720"/><stop offset="1" stop-color="#0a0e12"/></radialGradient>
<clipPath id="b1" clipPathUnits="userSpaceOnUse"><rect x="40" y="82" width="620" height="15"/></clipPath>
<clipPath id="b2" clipPathUnits="userSpaceOnUse"><rect x="40" y="104" width="620" height="12"/></clipPath>
</defs>
<style>
  text{ font-family:'Helvetica Neue',Arial,system-ui,'Segoe UI',sans-serif; }
  .mono{ font-family:ui-monospace,'SFMono-Regular',Menlo,monospace; }
  .name{ font-size:46px; font-weight:800; letter-spacing:3px; }
  .base{ fill:#eef2f6; animation:jit 6s infinite; }
  .cy{ fill:#22d3ee; opacity:0; animation:cy 6s steps(1) infinite; }
  .mg{ fill:#ff2b6d; opacity:0; animation:mg 6s steps(1) infinite; }
  .sl1{ fill:#eef2f6; animation:sl1 6s steps(1) infinite; }
  .sl2{ fill:#eef2f6; animation:sl2 6s steps(1) infinite; }
  .rule{ transform-box:fill-box; transform-origin:left center; animation:draw 6s ease-in-out infinite; }
  .scan{ opacity:.05; animation:scan 6s linear infinite; }
  .flash{ opacity:0; animation:flash 6s steps(1) infinite; }
  .stat{ animation:stat 6s ease-in-out infinite; }
  @keyframes jit{ 0%,38%,44%,84%,96%,100%{transform:translate(0,0)} 40%{transform:translate(1px,0)} 42%{transform:translate(-1px,0)} 86%{transform:translate(2px,0)} 89%{transform:translate(-2px,0)} 92%{transform:translate(1px,0)} }
  @keyframes cy{ 0%,38%,43%,84%,95%,100%{opacity:0;transform:translate(0,0)} 40%{opacity:.6;transform:translate(-2px,0)} 85%{opacity:.9;transform:translate(-5px,1px)} 88%{opacity:.9;transform:translate(3px,-1px)} 91%{opacity:.9;transform:translate(-3px,0)} 94%{opacity:.5;transform:translate(1px,0)} }
  @keyframes mg{ 0%,38%,43%,84%,95%,100%{opacity:0;transform:translate(0,0)} 40%{opacity:.55;transform:translate(2px,0)} 85%{opacity:.85;transform:translate(5px,-1px)} 88%{opacity:.85;transform:translate(-3px,1px)} 91%{opacity:.85;transform:translate(3px,0)} 94%{opacity:.45;transform:translate(-1px,0)} }
  @keyframes sl1{ 0%,84%,96%,100%{transform:translate(0,0)} 85%{transform:translate(16px,0)} 88%{transform:translate(-10px,0)} 91%{transform:translate(6px,0)} 94%{transform:translate(0,0)} }
  @keyframes sl2{ 0%,84%,96%,100%{transform:translate(0,0)} 86%{transform:translate(-14px,0)} 89%{transform:translate(9px,0)} 92%{transform:translate(-4px,0)} }
  @keyframes flash{ 0%,86%,100%{opacity:0} 87%{opacity:.14} 88%{opacity:0} 90%{opacity:.1} 91%{opacity:0} }
  @keyframes scan{ 0%{transform:translateY(-6px)} 100%{transform:translateY(200px)} }
  @keyframes draw{ 0%{transform:scaleX(0)} 25%{transform:scaleX(1)} 85%{transform:scaleX(1)} 100%{transform:scaleX(0)} }
  @keyframes stat{ 0%,100%{opacity:.5} 50%{opacity:1} }
  @media (prefers-reduced-motion: reduce){ *{animation:none!important} .cy,.mg,.flash,.scan{opacity:0} }
</style>

<rect x="0" y="0" width="840" height="200" rx="12" fill="url(#halo)"/>
<text x="782" y="176" text-anchor="end" font-size="150" font-weight="800" letter-spacing="-6" fill="#ffffff" opacity="0.035">AE</text>

<!-- kicker + HUD status chip (B'den) -->
<text x="50" y="50" font-size="11.5" letter-spacing="3.5" fill="#8b949e">FULL-STACK ENGINEER&#160;&#160;&#215;&#160;&#160;SECURITY RESEARCHER</text>
<g class="stat"><circle cx="654" cy="46" r="3.4" fill="#00ff9f"/><text x="666" y="50" font-size="11" letter-spacing="2" fill="#3fb07a" class="mono">SYSTEM ONLINE</text></g>

<!-- glitch name: chromatic channels + base + displaced slices -->
<text class="name mg" x="50" y="120">AHMET ERDOĞAN</text>
<text class="name cy" x="50" y="120">AHMET ERDOĞAN</text>
<text class="name base" x="50" y="120">AHMET ERDOĞAN</text>
<text class="name sl1" x="50" y="120" clip-path="url(#b1)">AHMET ERDOĞAN</text>
<text class="name sl2" x="50" y="120" clip-path="url(#b2)">AHMET ERDOĞAN</text>

<!-- whole-frame flash -->
<rect class="flash" x="0" y="0" width="840" height="200" rx="12" fill="#22d3ee"/>
<!-- ambient scanline -->
<rect class="scan" x="0" y="0" width="840" height="2" fill="#00ff9f"/>

<rect class="rule" x="50" y="140" width="320" height="1.6" rx="1" fill="url(#rule)"/>
<text x="50" y="164" font-size="12.5" fill="#6b7280">trust no input &#8212; validate everything</text>
<text class="mono" x="790" y="186" text-anchor="end" font-size="11" fill="#3a4553">root@blackbox:~$</text>
</svg>
