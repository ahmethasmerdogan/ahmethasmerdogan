<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" role="img" aria-label="Ahmet Erdoğan — focus areas, stats and achievements">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b12"/>
      <stop offset="1" stop-color="#03060b"/>
    </linearGradient>
    <linearGradient id="sedge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22e5ff"/>
      <stop offset="0.55" stop-color="#7a5cff"/>
      <stop offset="1" stop-color="#ff2e97"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="64" y1="0" x2="504" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22e5ff"/>
      <stop offset="1" stop-color="#ff2e97"/>
    </linearGradient>
    <radialGradient id="sglowA" cx="92%" cy="4%" r="55%">
      <stop offset="0" stop-color="#ff2e97" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ff2e97" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sglowB" cx="4%" cy="96%" r="55%">
      <stop offset="0" stop-color="#22e5ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#22e5ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="sgrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0 H0 V34" fill="none" stroke="#22e5ff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <pattern id="sscan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#000000" fill-opacity="0"/>
      <rect width="3" height="1" fill="#020509" fill-opacity="0.5"/>
    </pattern>
    <filter id="sglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="spanel"><rect x="28" y="20" width="1144" height="420" rx="16"/></clipPath>
  </defs>

  <rect width="1200" height="460" fill="url(#sbg)"/>
  <rect width="1200" height="460" fill="url(#sglowA)"/>
  <rect width="1200" height="460" fill="url(#sglowB)"/>

  <g clip-path="url(#spanel)">
    <rect x="28" y="20" width="1144" height="420" fill="#080d16" fill-opacity="0.86"/>
    <rect x="28" y="20" width="1144" height="420" fill="url(#sgrid)"/>

    <!-- header -->
    <g font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">
      <text x="64" y="66" font-size="19"><tspan fill="#00ff9c" filter="url(#sglow)">$</tspan><tspan fill="#7df9ff"> ./stats.sh</tspan><tspan fill="#3a4a5c"> --all </tspan><tspan fill="#3a4a5c" font-size="15"># systems · security · shipping</tspan></text>
      <line x1="64" y1="84" x2="1136" y2="84" stroke="#22e5ff" stroke-opacity="0.14"/>

      <!-- ===== LEFT: focus areas ===== -->
      <text x="64" y="128" font-size="13.5" fill="#ff5cad" letter-spacing="2">FOCUS AREAS</text>

      <!-- bar 1 -->
      <text x="64" y="172" font-size="15.5" fill="#c7d2e0">backend · systems</text>
      <text x="504" y="172" text-anchor="end" font-size="14" fill="#67e8f9">92%</text>
      <rect x="64" y="182" width="440" height="11" rx="5.5" fill="#16202e"/>
      <rect x="64" y="182" width="0" height="11" rx="5.5" fill="url(#barGrad)" filter="url(#sglow)">
        <animate attributeName="width" values="0;405" keyTimes="0;1" calcMode="spline" keySplines="0.2 0.8 0.2 1" begin="0.3s" dur="0.9s" fill="freeze"/>
      </rect>

      <!-- bar 2 -->
      <text x="64" y="216" font-size="15.5" fill="#c7d2e0">security · offensive</text>
      <text x="504" y="216" text-anchor="end" font-size="14" fill="#67e8f9">85%</text>
      <rect x="64" y="226" width="440" height="11" rx="5.5" fill="#16202e"/>
      <rect x="64" y="226" width="0" height="11" rx="5.5" fill="url(#barGrad)" filter="url(#sglow)">
        <animate attributeName="width" values="0;374" keyTimes="0;1" calcMode="spline" keySplines="0.2 0.8 0.2 1" begin="0.45s" dur="0.9s" fill="freeze"/>
      </rect>

      <!-- bar 3 -->
      <text x="64" y="260" font-size="15.5" fill="#c7d2e0">frontend · product</text>
      <text x="504" y="260" text-anchor="end" font-size="14" fill="#67e8f9">78%</text>
      <rect x="64" y="270" width="440" height="11" rx="5.5" fill="#16202e"/>
      <rect x="64" y="270" width="0" height="11" rx="5.5" fill="url(#barGrad)" filter="url(#sglow)">
        <animate attributeName="width" values="0;343" keyTimes="0;1" calcMode="spline" keySplines="0.2 0.8 0.2 1" begin="0.6s" dur="0.9s" fill="freeze"/>
      </rect>

      <!-- bar 4 -->
      <text x="64" y="304" font-size="15.5" fill="#c7d2e0">quant · data-eng</text>
      <text x="504" y="304" text-anchor="end" font-size="14" fill="#67e8f9">70%</text>
      <rect x="64" y="314" width="440" height="11" rx="5.5" fill="#16202e"/>
      <rect x="64" y="314" width="0" height="11" rx="5.5" fill="url(#barGrad)" filter="url(#sglow)">
        <animate attributeName="width" values="0;308" keyTimes="0;1" calcMode="spline" keySplines="0.2 0.8 0.2 1" begin="0.75s" dur="0.9s" fill="freeze"/>
      </rect>

      <!-- ===== RIGHT: stat tiles ===== -->
      <text x="640" y="128" font-size="13.5" fill="#ff5cad" letter-spacing="2">BY THE NUMBERS</text>

      <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.6s" fill="freeze"/>
        <rect x="640" y="146" width="238" height="90" rx="12" fill="#0b1220" fill-opacity="0.7" stroke="#22e5ff" stroke-opacity="0.16"/>
        <text x="662" y="204" font-size="40" font-weight="700" fill="#22e5ff" filter="url(#sglow)">06+</text>
        <text x="662" y="222" font-size="12.5" fill="#7c8ea0" letter-spacing="1.5">YEARS ON GITHUB</text>

        <rect x="894" y="146" width="238" height="90" rx="12" fill="#0b1220" fill-opacity="0.7" stroke="#ff2e97" stroke-opacity="0.16"/>
        <text x="916" y="204" font-size="40" font-weight="700" fill="#ff5cad" filter="url(#sglow)">09</text>
        <text x="916" y="222" font-size="12.5" fill="#7c8ea0" letter-spacing="1.5">PUBLIC REPOS</text>

        <rect x="640" y="248" width="238" height="90" rx="12" fill="#0b1220" fill-opacity="0.7" stroke="#00ff9c" stroke-opacity="0.16"/>
        <text x="662" y="306" font-size="40" font-weight="700" fill="#00ff9c" filter="url(#sglow)">10+</text>
        <text x="662" y="324" font-size="12.5" fill="#7c8ea0" letter-spacing="1.5">TECHNOLOGIES</text>

        <rect x="894" y="248" width="238" height="90" rx="12" fill="#0b1220" fill-opacity="0.7" stroke="#7a5cff" stroke-opacity="0.2"/>
        <text x="916" y="306" font-size="40" font-weight="700" fill="#a78bfa" filter="url(#sglow)">∞</text>
        <text x="916" y="324" font-size="12.5" fill="#7c8ea0" letter-spacing="1.5">THREAT MODELS</text>
      </g>

      <!-- ===== achievements strip ===== -->
      <line x1="64" y1="368" x2="1136" y2="368" stroke="#22e5ff" stroke-opacity="0.14"/>
      <g opacity="0" font-size="15"><animate attributeName="opacity" from="0" to="1" begin="1s" dur="0.6s" fill="freeze"/>
        <text x="64" y="404" fill="#ff5cad" letter-spacing="2" font-size="13.5">UNLOCKED</text>
        <text x="210" y="404">
          <tspan fill="#3a4a5c">[ </tspan><tspan fill="#00ff9c" filter="url(#sglow)">⬡ Pull Shark</tspan><tspan fill="#3a4a5c"> ]   [ </tspan><tspan fill="#00ff9c" filter="url(#sglow)">⬡ YOLO</tspan><tspan fill="#3a4a5c"> ]   [ </tspan><tspan fill="#00ff9c" filter="url(#sglow)">⬡ Quickdraw</tspan><tspan fill="#3a4a5c"> ]   [ </tspan><tspan fill="#22e5ff" filter="url(#sglow)">◈ TryHackMe</tspan><tspan fill="#3a4a5c"> ]</tspan>
        </text>
      </g>
    </g>

    <rect x="28" y="20" width="1144" height="420" fill="url(#sscan)" opacity="0.55"/>
  </g>

  <rect x="28" y="20" width="1144" height="420" rx="16" fill="none" stroke="url(#sedge)" stroke-width="1.5" filter="url(#sglow)" opacity="0.85"/>
</svg>
