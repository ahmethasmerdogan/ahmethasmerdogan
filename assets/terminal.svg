<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" width="920" height="430" role="img" aria-label="ahmet@erdogan — Full-Stack Engineer and Security Researcher">
  <defs>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1f27"/>
      <stop offset="1" stop-color="#0f131a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#21262d"/>
      <stop offset="1" stop-color="#1a1f27"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="30" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <clipPath id="round"><rect x="44" y="26" width="832" height="346" rx="14"/></clipPath>
    <style>
      text { font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', 'Menlo', 'Cascadia Code', monospace; }
      .fg  { fill:#c9d1d9; }
      .mut { fill:#7d8590; }
      .grn { fill:#3fb950; }
      .cyn { fill:#39c5cf; }
      .name{ fill:#f0f6fc; font-size:30px; font-weight:700; letter-spacing:.5px; }
      .role{ fill:#8b949e; font-size:15px; letter-spacing:.3px; }
      .cmd { font-size:16px; }
      .prin{ fill:#8b949e; font-size:14.5px; font-style:italic; }
    </style>
  </defs>

  <!-- window -->
  <g filter="url(#shadow)">
    <rect x="44" y="26" width="832" height="346" rx="14" fill="url(#win)" stroke="#30363d" stroke-width="1"/>
  </g>

  <g clip-path="url(#round)">
    <!-- title bar -->
    <rect x="44" y="26" width="832" height="44" fill="url(#bar)"/>
    <line x1="44" y1="70" x2="876" y2="70" stroke="#30363d" stroke-width="1"/>
    <!-- traffic lights -->
    <circle cx="72"  cy="48" r="6.5" fill="#ff5f56" stroke="#e0443e" stroke-width="0.5"/>
    <circle cx="94"  cy="48" r="6.5" fill="#ffbd2e" stroke="#dea123" stroke-width="0.5"/>
    <circle cx="116" cy="48" r="6.5" fill="#27c93f" stroke="#1aab29" stroke-width="0.5"/>
    <text x="460" y="52" text-anchor="middle" class="mut" font-size="12.5" letter-spacing=".4">ahmet@erdogan  —  ~/portfolio  —  zsh</text>
    <!-- subtle top highlight -->
    <rect x="45" y="27" width="830" height="1" fill="#ffffff" opacity="0.04"/>
  </g>

  <!-- body -->
  <text x="76" y="120" class="cmd">
    <tspan class="grn" font-weight="600">❯</tspan><tspan class="cyn" dx="14">~/portfolio</tspan><tspan class="fg" dx="14">whoami</tspan>
  </text>

  <text x="76" y="172" class="name">Ahmet Erdoğan</text>
  <text x="76" y="202" class="role">Full-Stack Engineer<tspan class="mut" dx="6">·</tspan><tspan dx="6">Security Researcher</tspan></text>

  <text x="76" y="258" class="cmd">
    <tspan class="grn" font-weight="600">❯</tspan><tspan class="cyn" dx="14">~/portfolio</tspan><tspan class="fg" dx="14">echo $PRINCIPLE</tspan>
  </text>
  <text x="76" y="292" class="prin">"Trust no input — validate everything."</text>

  <text x="76" y="346" class="cmd">
    <tspan class="grn" font-weight="600">❯</tspan><tspan class="cyn" dx="14">~/portfolio</tspan>
  </text>
  <rect x="218" y="332" width="10" height="18" rx="1.5" fill="#3fb950">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
