<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1520" width="1200" height="1520" role="img" aria-label="Ahmet Erdoğan — Full-Stack Engineer and Security Researcher">
  <defs>
    <radialGradient id="glow" cx="50%" cy="16%" r="52%">
      <stop offset="0" stop-color="#eef2ff" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#faf5ff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#18181b"/><stop offset="1" stop-color="#000000"/></linearGradient>
    <pattern id="glyphs" width="120" height="120" patternUnits="userSpaceOnUse">
      <g stroke="#d4d4d8" stroke-width="1.4" fill="none" stroke-linecap="round">
        <path d="M12,18 h10"/><path d="M43,12 l8,8 M51,12 l-8,8"/><rect x="78" y="20" width="8" height="8" rx="1"/>
        <circle cx="106" cy="42" r="1.6" fill="#d4d4d8" stroke="none"/><path d="M16,52 l10,-10"/>
        <path d="M56,48 h10 M56,52 h10 M56,56 h10"/><path d="M96,60 v10"/>
        <circle cx="28" cy="90" r="1.6" fill="#d4d4d8" stroke="none"/><rect x="66" y="88" width="8" height="8" rx="1"/>
        <path d="M98,96 l8,8"/><path d="M12,108 l8,8 M20,108 l-8,8"/>
      </g>
    </pattern>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="2" stdDeviation="7" flood-color="#0b0b18" flood-opacity="0.07"/></filter>
    <filter id="shb" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#0b0b18" flood-opacity="0.14"/></filter>
    <clipPath id="clip"><rect x="0" y="0" width="1200" height="1520" rx="30"/></clipPath>
    <style>
      text{ font-family:-apple-system,'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif; }
      .wm{ fill:#09090b; font-size:16px; font-weight:600; letter-spacing:-0.2px; }
      .nav{ fill:#52525b; font-size:15px; font-weight:500; }
      .badge{ fill:#3f3f46; font-size:14px; font-weight:500; }
      .name{ fill:#09090b; font-size:90px; font-weight:800; letter-spacing:-3.5px; }
      .sub{ fill:#52525b; font-size:22px; font-weight:400; letter-spacing:-0.2px; }
      .cloud{ fill:#a1a1aa; font-size:18px; font-weight:600; letter-spacing:-0.2px; }
      .sec{ fill:#a1a1aa; font-size:12.5px; font-weight:600; letter-spacing:2.5px; }
      .ct{ fill:#18181b; font-size:17px; font-weight:600; letter-spacing:-0.2px; }
      .cd{ fill:#71717a; font-size:13.5px; }
      .cg{ fill:#a1a1aa; font-size:12.5px; font-weight:500; }
      .chip{ fill:#3f3f46; font-size:14px; font-weight:500; }
      .num{ fill:#09090b; font-size:46px; font-weight:800; letter-spacing:-1.5px; }
      .nlab{ fill:#71717a; font-size:14px; font-weight:500; }
      .icn{ fill:none; stroke:#18181b; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1200" height="1520" fill="#ffffff"/>
    <rect width="1200" height="720" fill="url(#glow)"/>
    <rect x="0" y="0" width="1200" height="1520" rx="30" fill="none" stroke="#e6e6ea" stroke-width="1.5"/>

    <!-- ===== NAV ===== -->
    <rect x="64" y="24" width="34" height="34" rx="9" fill="url(#ink)"/>
    <text x="81" y="47" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">A</text>
    <text x="110" y="47" class="wm">Ahmet Erdoğan</text>
    <text x="982" y="47" text-anchor="end" class="nav">Portfolio</text>
    <rect x="1000" y="21" width="136" height="40" rx="20" fill="url(#ink)"/>
    <text x="1068" y="46" text-anchor="middle" fill="#ffffff" font-size="14.5" font-weight="600">GitHub ↗</text>

    <!-- ===== HERO ===== -->
    <g transform="translate(600,150)" filter="url(#sh)">
      <rect x="-206" y="-19" width="412" height="38" rx="19" fill="#ffffff" stroke="#e6e6ea"/>
    </g>
    <circle cx="416" cy="150" r="4" fill="#6366f1"/>
    <text x="600" y="155" text-anchor="middle" class="badge">Full-Stack Engineer · Security Researcher</text>

    <text x="600" y="300" text-anchor="middle" class="name">Ahmet Erdoğan</text>
    <text x="600" y="364" text-anchor="middle" class="sub">Full-stack engineering and offensive security —</text>
    <text x="600" y="396" text-anchor="middle" class="sub">event-driven systems, quant infrastructure, web &amp; app security.</text>

    <!-- CTA buttons -->
    <g filter="url(#shb)"><rect x="426" y="446" width="210" height="50" rx="25" fill="url(#ink)"/></g>
    <text x="531" y="477" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">View Portfolio →</text>
    <rect x="652" y="446" width="122" height="50" rx="25" fill="#ffffff" stroke="#d4d4d8"/>
    <text x="713" y="477" text-anchor="middle" fill="#18181b" font-size="16" font-weight="600">GitHub</text>

    <!-- logo cloud (languages) -->
    <text x="600" y="556" text-anchor="middle" class="sec">WORKING WITH</text>
    <text x="150"  y="600" text-anchor="middle" class="cloud">Python</text>
    <text x="305"  y="600" text-anchor="middle" class="cloud">TypeScript</text>
    <text x="450"  y="600" text-anchor="middle" class="cloud">Kotlin</text>
    <text x="575"  y="600" text-anchor="middle" class="cloud">PHP</text>
    <text x="695"  y="600" text-anchor="middle" class="cloud">React</text>
    <text x="830"  y="600" text-anchor="middle" class="cloud">Docker</text>
    <text x="965"  y="600" text-anchor="middle" class="cloud">Linux</text>
    <text x="1075" y="600" text-anchor="middle" class="cloud">SQL</text>

    <!-- ===== FOCUS AREAS ===== -->
    <text x="600" y="700" text-anchor="middle" class="sec">WHAT I WORK ON</text>

    <!-- row 1 -->
    <g filter="url(#sh)"><rect x="64" y="730" width="341" height="172" rx="16" fill="#ffffff" stroke="#ececef"/></g>
    <rect x="88" y="754" width="40" height="40" rx="11" fill="#f4f4f5"/>
    <g transform="translate(108,774)" class="icn"><path d="M -3,-6 L -9,0 L -3,6"/><path d="M 4,-6 L 10,0 L 4,6"/><path d="M -1,7 L 1,-7"/></g>
    <text x="88" y="830" class="ct">Full-Stack Engineering</text>
    <text x="88" y="856" class="cd">Event-driven SaaS &amp; enterprise platforms</text>
    <text x="88" y="882" class="cg">FastAPI · Next.js · Laravel · PostgreSQL</text>

    <g filter="url(#sh)"><rect x="429" y="730" width="341" height="172" rx="16" fill="#ffffff" stroke="#ececef"/></g>
    <rect x="453" y="754" width="40" height="40" rx="11" fill="#f4f4f5"/>
    <g transform="translate(473,774)" class="icn"><path d="M 0,-9 L 8,-5 L 8,0 C 8,5 4,8 0,10 C -4,8 -8,5 -8,0 L -8,-5 Z"/><path d="M -3.5,0 L -1,2.5 L 4,-3"/></g>
    <text x="453" y="830" class="ct">Offensive Security</text>
    <text x="453" y="856" class="cd">Web &amp; app penetration testing</text>
    <text x="453" y="882" class="cg">Burp Suite · Nmap · Metasploit · OWASP</text>

    <g filter="url(#sh)"><rect x="794" y="730" width="342" height="172" rx="16" fill="#ffffff" stroke="#ececef"/></g>
    <rect x="818" y="754" width="40" height="40" rx="11" fill="#f4f4f5"/>
    <g transform="translate(838,774)" class="icn"><circle cx="0" cy="0" r="8"/><circle cx="0" cy="0" r="2.4"/><path d="M0,-11 V-8 M0,8 V11 M-11,0 H-8 M8,0 H11"/></g>
    <text x="818" y="830" class="ct">Threat Modeling</text>
    <text x="818" y="856" class="cd">Secure-by-design architecture reviews</text>
    <text x="818" y="882" class="cg">STRIDE · DFD · Zero-Trust</text>

    <!-- row 2 -->
    <g filter="url(#sh)"><rect x="64" y="922" width="341" height="172" rx="16" fill="#ffffff" stroke="#ececef"/></g>
    <rect x="88" y="946" width="40" height="40" rx="11" fill="#f4f4f5"/>
    <g transform="translate(108,966)" class="icn"><path d="M -7,8 V2 M -2,8 V-4 M 3,8 V-1 M 8,8 V-7"/></g>
    <text x="88" y="1022" class="ct">Quant &amp; Trading</text>
    <text x="88" y="1048" class="cd">Event-driven backtests &amp; risk engines</text>
    <text x="88" y="1074" class="cg">Python · Pandas · NumPy</text>

    <g filter="url(#sh)"><rect x="429" y="922" width="341" height="172" rx="16" fill="#ffffff" stroke="#ececef"/></g>
    <rect x="453" y="946" width="40" height="40" rx="11" fill="#f4f4f5"/>
    <g transform="translate(473,966)" class="icn"><path d="M 0,-8 L 9,-3 L 0,2 L -9,-3 Z"/><path d="M -9,1 L 0,6 L 9,1"/><path d="M -9,5 L 0,10 L 9,5"/></g>
    <text x="453" y="1022" class="ct">Distributed Systems</text>
    <text x="453" y="1048" class="cd">Scalable, observable services</text>
    <text x="453" y="1074" class="cg">Docker · Redis · CI/CD</text>

    <g filter="url(#sh)"><rect x="794" y="922" width="342" height="172" rx="16" fill="#ffffff" stroke="#ececef"/></g>
    <rect x="818" y="946" width="40" height="40" rx="11" fill="#f4f4f5"/>
    <g transform="translate(838,966)" class="icn"><ellipse cx="0" cy="1" rx="5" ry="7"/><path d="M-5,-2 L-9,-4 M5,-2 L9,-4 M-5,1 H-10 M5,1 H10 M-5,4 L-9,7 M5,4 L9,7 M-2.5,-6 L-4,-9 M2.5,-6 L4,-9"/></g>
    <text x="818" y="1022" class="ct">Reverse Engineering</text>
    <text x="818" y="1048" class="cd">Binary analysis &amp; exploit dev</text>
    <text x="818" y="1074" class="cg">Ghidra · GDB · pwntools</text>

    <!-- ===== LANGUAGES ===== -->
    <text x="600" y="1168" text-anchor="middle" class="sec">LANGUAGES</text>
    <g transform="translate(0,1192)">
      <rect x="276" y="0" width="150" height="42" rx="21" fill="#f7f7f8" stroke="#ececef"/><text x="351" y="27" text-anchor="middle" class="chip">Python</text>
      <rect x="442" y="0" width="150" height="42" rx="21" fill="#f7f7f8" stroke="#ececef"/><text x="517" y="27" text-anchor="middle" class="chip">TypeScript</text>
      <rect x="608" y="0" width="150" height="42" rx="21" fill="#f7f7f8" stroke="#ececef"/><text x="683" y="27" text-anchor="middle" class="chip">Kotlin</text>
      <rect x="774" y="0" width="150" height="42" rx="21" fill="#f7f7f8" stroke="#ececef"/><text x="849" y="27" text-anchor="middle" class="chip">PHP</text>
      <rect x="359" y="54" width="150" height="42" rx="21" fill="#f7f7f8" stroke="#ececef"/><text x="434" y="81" text-anchor="middle" class="chip">SQL</text>
      <rect x="525" y="54" width="150" height="42" rx="21" fill="#f7f7f8" stroke="#ececef"/><text x="600" y="81" text-anchor="middle" class="chip">Bash</text>
      <rect x="691" y="54" width="150" height="42" rx="21" fill="#f7f7f8" stroke="#ececef"/><text x="766" y="81" text-anchor="middle" class="chip">JavaScript</text>
    </g>

    <!-- ===== STATS (on glyph-grid backdrop) ===== -->
    <g filter="url(#sh)"><rect x="64" y="1340" width="1072" height="140" rx="18" fill="#fafafa" stroke="#ececef"/></g>
    <rect x="64" y="1340" width="1072" height="140" rx="18" fill="url(#glyphs)" opacity="0.6"/>
    <line x1="332" y1="1372" x2="332" y2="1448" stroke="#e4e4e7"/>
    <line x1="600" y1="1372" x2="600" y2="1448" stroke="#e4e4e7"/>
    <line x1="868" y1="1372" x2="868" y2="1448" stroke="#e4e4e7"/>
    <text x="198" y="1418" text-anchor="middle" class="num">6+</text>
    <text x="198" y="1450" text-anchor="middle" class="nlab">yrs on GitHub</text>
    <text x="466" y="1418" text-anchor="middle" class="num">8</text>
    <text x="466" y="1450" text-anchor="middle" class="nlab">public repos</text>
    <text x="734" y="1418" text-anchor="middle" class="num">9</text>
    <text x="734" y="1450" text-anchor="middle" class="nlab">languages</text>
    <text x="1002" y="1418" text-anchor="middle" class="num">∞</text>
    <text x="1002" y="1450" text-anchor="middle" class="nlab">threat models</text>
  </g>
</svg>
