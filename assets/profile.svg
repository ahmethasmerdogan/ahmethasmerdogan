<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1700" width="1200" height="1700" role="img" aria-label="Ahmet Erdoğan — Full-Stack Engineer and Security Researcher">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a0a0f"/><stop offset="1" stop-color="#050507"/></linearGradient>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.03"/></pattern>
    <radialGradient id="glowTop" cx="50%" cy="0%" r="45%"><stop offset="0" stop-color="#8b5cf6" stop-opacity="0.28"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowL" cx="8%" cy="34%" r="34%"><stop offset="0" stop-color="#6366f1" stop-opacity="0.16"/><stop offset="1" stop-color="#6366f1" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowR" cx="94%" cy="66%" r="34%"><stop offset="0" stop-color="#ec4899" stop-opacity="0.12"/><stop offset="1" stop-color="#ec4899" stop-opacity="0"/></radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#60a5fa"/><stop offset="0.5" stop-color="#a78bfa"/><stop offset="1" stop-color="#f472b6"/></linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6d28d9"/></linearGradient>
    <linearGradient id="fadeL" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#070709"/><stop offset="1" stop-color="#070709" stop-opacity="0"/></linearGradient>
    <linearGradient id="fadeR" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#070709" stop-opacity="0"/><stop offset="1" stop-color="#070709"/></linearGradient>
    <clipPath id="clip"><rect x="0" y="0" width="1200" height="1700" rx="40"/></clipPath>
    <clipPath id="mclip"><rect x="0" y="452" width="1200" height="70"/></clipPath>
    <style>
      text{ font-family:-apple-system,'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif; }
      .mono{ font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace; }
      .logo{ fill:#f4f4f5; font-size:17px; font-weight:600; letter-spacing:-0.2px; }
      .pillT{ fill:#c4b5fd; font-size:12.5px; font-weight:600; letter-spacing:2px; }
      .name{ font-size:98px; font-weight:700; letter-spacing:-4px; }
      .sub{ fill:#a1a1aa; font-size:22px; font-weight:400; letter-spacing:-0.2px; }
      .marq{ fill:#4b4b55; font-size:21px; font-weight:700; letter-spacing:-0.3px; }
      .sec{ fill:#71717a; font-size:12.5px; font-weight:600; letter-spacing:3px; }
      .h2{ fill:#f4f4f5; font-size:42px; font-weight:300; letter-spacing:-1.2px; }
      .tabT{ fill:#f4f4f5; font-size:18px; font-weight:600; }
      .tabD{ fill:#8b8b95; font-size:13.5px; }
      .code{ font-size:14.5px; }
      .ft{ fill:#f4f4f5; font-size:18px; font-weight:600; letter-spacing:-0.2px; }
      .fd{ fill:#8b8b95; font-size:13.5px; }
      .more{ fill:#a78bfa; font-size:13px; font-weight:600; }
      .ghost{ fill:#ffffff; fill-opacity:0.09; font-size:88px; font-weight:800; letter-spacing:-3px; }
      .glab{ fill:#a1a1aa; font-size:15px; font-weight:500; }
      .quote{ fill:#a1a1aa; font-size:24px; font-weight:400; letter-spacing:-0.3px; }
      .icn{ fill:none; stroke:#ffffff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1200" height="1700" fill="url(#bg)"/>
    <rect width="1200" height="1700" fill="url(#dots)"/>
    <rect width="1200" height="1700" fill="url(#glowTop)"/>
    <rect width="1200" height="1700" fill="url(#glowL)"/>
    <rect width="1200" height="1700" fill="url(#glowR)"/>
    <rect width="1200" height="0.5" y="0.5" fill="#ffffff" opacity="0.06"/>

    <!-- ===== TOP NAV ===== -->
    <text x="72" y="52" class="mono logo"><tspan fill="#a78bfa">&#62;_</tspan> ahmet<tspan fill="#71717a">.dev</tspan></text>
    <rect x="1000" y="28" width="128" height="42" rx="21" fill="url(#btn)"/>
    <text x="1064" y="54" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Portfolio ↗</text>

    <!-- ===== HERO ===== -->
    <g transform="translate(600,150)">
      <rect x="-236" y="-20" width="472" height="38" rx="19" fill="#ffffff" fill-opacity="0.04" stroke="#8b5cf6" stroke-opacity="0.4"/>
      <rect x="-224" y="-11" width="72" height="20" rx="10" fill="#8b5cf6" fill-opacity="0.18"/>
      <text x="-188" y="4" text-anchor="middle" fill="#c4b5fd" font-size="11.5" font-weight="700" letter-spacing="1">HELLO</text>
      <text x="26" y="4" text-anchor="middle" class="pillT">FULL-STACK × OFFENSIVE SECURITY</text>
    </g>
    <text x="600" y="310" text-anchor="middle" class="name" fill="url(#grad)">Ahmet Erdoğan</text>
    <text x="600" y="372" text-anchor="middle" class="sub">Ölçeklenebilir sistemler kuruyor,</text>
    <text x="600" y="402" text-anchor="middle" class="sub">hepsini saldırgan gözüyle sağlamlaştırıyorum.</text>

    <!-- ===== TECH MARQUEE (grayscale) ===== -->
    <g clip-path="url(#mclip)">
      <g>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="-1980 0" dur="30s" repeatCount="indefinite"/>
        <g>
          <text x="90"   y="495" text-anchor="middle" class="marq">Python</text>
          <text x="290"  y="495" text-anchor="middle" class="marq">TypeScript</text>
          <text x="490"  y="495" text-anchor="middle" class="marq">Kotlin</text>
          <text x="690"  y="495" text-anchor="middle" class="marq">FastAPI</text>
          <text x="890"  y="495" text-anchor="middle" class="marq">Next.js</text>
          <text x="1090" y="495" text-anchor="middle" class="marq">React</text>
          <text x="1290" y="495" text-anchor="middle" class="marq">PostgreSQL</text>
          <text x="1490" y="495" text-anchor="middle" class="marq">Docker</text>
          <text x="1690" y="495" text-anchor="middle" class="marq">Kali</text>
          <text x="1880" y="495" text-anchor="middle" class="marq">Burp Suite</text>
        </g>
        <g transform="translate(1980,0)">
          <text x="90"   y="495" text-anchor="middle" class="marq">Python</text>
          <text x="290"  y="495" text-anchor="middle" class="marq">TypeScript</text>
          <text x="490"  y="495" text-anchor="middle" class="marq">Kotlin</text>
          <text x="690"  y="495" text-anchor="middle" class="marq">FastAPI</text>
          <text x="890"  y="495" text-anchor="middle" class="marq">Next.js</text>
          <text x="1090" y="495" text-anchor="middle" class="marq">React</text>
          <text x="1290" y="495" text-anchor="middle" class="marq">PostgreSQL</text>
          <text x="1490" y="495" text-anchor="middle" class="marq">Docker</text>
          <text x="1690" y="495" text-anchor="middle" class="marq">Kali</text>
          <text x="1880" y="495" text-anchor="middle" class="marq">Burp Suite</text>
        </g>
      </g>
    </g>
    <rect x="0" y="452" width="160" height="70" fill="url(#fadeL)"/>
    <rect x="1040" y="452" width="160" height="70" fill="url(#fadeR)"/>

    <!-- ===== CODE DEMO (tabs + code) ===== -->
    <text x="600" y="600" text-anchor="middle" class="sec">IN PRACTICE</text>

    <!-- left tabs -->
    <rect x="72" y="632" width="336" height="88" rx="14" fill="#14141b" stroke="#8b5cf6" stroke-opacity="0.5"/>
    <rect x="72" y="632" width="4" height="88" rx="2" fill="#8b5cf6"/>
    <text x="100" y="672" class="tabT">Engineering</text>
    <text x="100" y="698" class="tabD">Event-driven SaaS &amp; platformlar</text>

    <rect x="72" y="732" width="336" height="88" rx="14" fill="#0c0c11" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="100" y="772" class="tabT">Security</text>
    <text x="100" y="798" class="tabD">Pentest · threat modeling · exploit</text>

    <rect x="72" y="832" width="336" height="88" rx="14" fill="#0c0c11" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="100" y="872" class="tabT">Systems</text>
    <text x="100" y="898" class="tabD">Ölçeklenebilir, dağıtık servisler</text>

    <!-- right code panel -->
    <rect x="440" y="632" width="688" height="288" rx="16" fill="#0b0b10" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="470" cy="662" r="5" fill="#ff5f56"/><circle cx="488" cy="662" r="5" fill="#ffbd2e"/><circle cx="506" cy="662" r="5" fill="#27c93f"/>
    <text x="784" y="666" text-anchor="middle" class="mono" font-size="12.5" fill="#52525b">engineering.ts</text>
    <line x1="440" y1="686" x2="1128" y2="686" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="470" y="722" class="mono code"><tspan fill="#f472b6">import</tspan><tspan fill="#e4e4e7"> { build, ship } </tspan><tspan fill="#f472b6">from</tspan><tspan fill="#7ee787"> '@ahmet/core'</tspan></text>
    <text x="470" y="778" class="mono code"><tspan fill="#c084fc">const</tspan><tspan fill="#82aaff"> app</tspan><tspan fill="#e4e4e7"> = </tspan><tspan fill="#82aaff">build</tspan><tspan fill="#e4e4e7">({</tspan></text>
    <text x="470" y="806" class="mono code"><tspan fill="#8b8b95">  runtime: </tspan><tspan fill="#7ee787">'event-driven'</tspan><tspan fill="#e4e4e7">,</tspan></text>
    <text x="470" y="834" class="mono code"><tspan fill="#8b8b95">  stack: </tspan><tspan fill="#e4e4e7">[</tspan><tspan fill="#7ee787">'FastAPI'</tspan><tspan fill="#e4e4e7">, </tspan><tspan fill="#7ee787">'Next.js'</tspan><tspan fill="#e4e4e7">],</tspan></text>
    <text x="470" y="862" class="mono code"><tspan fill="#e4e4e7">})</tspan></text>
    <text x="470" y="900" class="mono code"><tspan fill="#c084fc">await</tspan><tspan fill="#82aaff"> ship</tspan><tspan fill="#e4e4e7">(app, { </tspan><tspan fill="#60a5fa">zeroTrust</tspan><tspan fill="#e4e4e7">: </tspan><tspan fill="#60a5fa">true</tspan><tspan fill="#e4e4e7"> })</tspan></text>
    <rect x="690" y="888" width="8" height="15" fill="#a78bfa"><animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></rect>

    <!-- ===== CAPABILITIES (feature grid) ===== -->
    <text x="600" y="1010" text-anchor="middle" class="sec">CAPABILITIES</text>
    <text x="600" y="1064" text-anchor="middle" class="h2">Uçtan uca inşa ediyorum.</text>

    <rect x="72" y="1110" width="1056" height="300" rx="20" fill="#0a0a10" stroke="#ffffff" stroke-opacity="0.08"/>
    <line x1="424" y1="1110" x2="424" y2="1410" stroke="#ffffff" stroke-opacity="0.07"/>
    <line x1="776" y1="1110" x2="776" y2="1410" stroke="#ffffff" stroke-opacity="0.07"/>
    <line x1="72" y1="1260" x2="1128" y2="1260" stroke="#ffffff" stroke-opacity="0.07"/>

    <!-- r1c1 Engineering -->
    <rect x="102" y="1138" width="40" height="40" rx="11" fill="url(#tile)"/>
    <g transform="translate(122,1158)" class="icn"><path d="M -3,-6 L -9,0 L -3,6"/><path d="M 4,-6 L 10,0 L 4,6"/><path d="M -1,7 L 1,-7"/></g>
    <text x="102" y="1206" class="ft">Engineering</text>
    <text x="102" y="1230" class="fd">Event-driven SaaS &amp; platformlar</text>
    <text x="102" y="1250" class="more">Learn more ›</text>
    <!-- r1c2 Security -->
    <rect x="454" y="1138" width="40" height="40" rx="11" fill="url(#tile)"/>
    <g transform="translate(474,1158)" class="icn"><path d="M 0,-9 L 8,-5 L 8,0 C 8,5 4,8 0,10 C -4,8 -8,5 -8,0 L -8,-5 Z"/><path d="M -3.5,0 L -1,2.5 L 4,-3"/></g>
    <text x="454" y="1206" class="ft">Security</text>
    <text x="454" y="1230" class="fd">Web &amp; app pentest, threat modeling</text>
    <text x="454" y="1250" class="more">Learn more ›</text>
    <!-- r1c3 Systems -->
    <rect x="806" y="1138" width="40" height="40" rx="11" fill="url(#tile)"/>
    <g transform="translate(826,1158)" class="icn"><path d="M 0,-8 L 9,-3 L 0,2 L -9,-3 Z"/><path d="M -9,1 L 0,6 L 9,1"/><path d="M -9,5 L 0,10 L 9,5"/></g>
    <text x="806" y="1206" class="ft">Systems</text>
    <text x="806" y="1230" class="fd">Ölçeklenebilir, gözlemlenebilir servis</text>
    <text x="806" y="1250" class="more">Learn more ›</text>

    <!-- r2c1 Quant -->
    <rect x="102" y="1288" width="40" height="40" rx="11" fill="url(#tile)"/>
    <g transform="translate(122,1308)" class="icn"><path d="M -8,8 L -8,2"/><path d="M -3,8 L -3,-4"/><path d="M 2,8 L 2,-1"/><path d="M 7,8 L 7,-7"/></g>
    <text x="102" y="1356" class="ft">Quant</text>
    <text x="102" y="1380" class="fd">Event-driven backtest &amp; risk motoru</text>
    <text x="102" y="1400" class="more">Learn more ›</text>
    <!-- r2c2 Architecture -->
    <rect x="454" y="1288" width="40" height="40" rx="11" fill="url(#tile)"/>
    <g transform="translate(474,1308)" class="icn"><circle cx="0" cy="-6" r="2.4"/><circle cx="-7" cy="6" r="2.4"/><circle cx="7" cy="6" r="2.4"/><path d="M -1.5,-4 L -5.5,4"/><path d="M 1.5,-4 L 5.5,4"/><path d="M -5,6 L 5,6"/></g>
    <text x="454" y="1356" class="ft">Architecture</text>
    <text x="454" y="1380" class="fd">Temiz mimari · DDD · event-sourcing</text>
    <text x="454" y="1400" class="more">Learn more ›</text>
    <!-- r2c3 Delivery -->
    <rect x="806" y="1288" width="40" height="40" rx="11" fill="url(#tile)"/>
    <g transform="translate(826,1308)" class="icn"><path d="M 2,-9 L -6,2 L 0,2 L -2,9 L 6,-2 L 0,-2 Z"/></g>
    <text x="806" y="1356" class="ft">Delivery</text>
    <text x="806" y="1380" class="fd">Hızlı, güvenli CI/CD sevkiyatı</text>
    <text x="806" y="1400" class="more">Learn more ›</text>

    <!-- ===== BY THE NUMBERS (ghost stats) ===== -->
    <text x="600" y="1476" text-anchor="middle" class="sec">BY THE NUMBERS</text>
    <text x="204" y="1566" text-anchor="middle" class="ghost">6+</text>
    <text x="204" y="1600" text-anchor="middle" class="glab">yıl GitHub'da</text>
    <text x="468" y="1566" text-anchor="middle" class="ghost">8</text>
    <text x="468" y="1600" text-anchor="middle" class="glab">açık repo</text>
    <text x="732" y="1566" text-anchor="middle" class="ghost">9</text>
    <text x="732" y="1600" text-anchor="middle" class="glab">farklı dil</text>
    <text x="996" y="1566" text-anchor="middle" class="ghost" fill="url(#grad)" fill-opacity="1">∞</text>
    <text x="996" y="1600" text-anchor="middle" class="glab">threat model</text>

    <!-- ===== CLOSING ===== -->
    <text x="600" y="1664" text-anchor="middle" class="quote">Güvenlik sonradan bir katman değil, <tspan fill="url(#grad)" font-weight="600">tasarımın ilk kararı.</tspan></text>
  </g>
</svg>
