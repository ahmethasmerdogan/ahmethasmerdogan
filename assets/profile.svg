    <rect x="440" y="632" width="688" height="288" rx="16" fill="#08080c" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="472" y="678" class="mono code"><tspan class="kw">import</tspan><tspan class="pu"> { build, harden, ship } </tspan><tspan class="kw">from</tspan><tspan class="str"> '@ahmet/core'</tspan></text>
    <text x="472" y="734" class="mono code"><tspan class="kw">const</tspan><tspan class="var"> service</tspan><tspan class="pu"> = </tspan><tspan class="fn">build</tspan><tspan class="pu">({</tspan></text>
    <text x="472" y="762" class="mono code"><tspan class="pu">  runtime: </tspan><tspan class="str">'event-driven'</tspan><tspan class="pu">,</tspan></text>
    <text x="472" y="790" class="mono code"><tspan class="pu">  stack: [</tspan><tspan class="str">'FastAPI'</tspan><tspan class="pu">, </tspan><tspan class="str">'Next.js'</tspan><tspan class="pu">, </tspan><tspan class="str">'Postgres'</tspan><tspan class="pu">],</tspan></text>
    <text x="472" y="818" class="mono code"><tspan class="pu">})</tspan></text>
    <text x="472" y="874" class="mono code"><tspan class="kw">await</tspan><tspan class="fn"> harden</tspan><tspan class="pu">(service, { </tspan><tspan class="var">threatModel</tspan><tspan class="pu">: </tspan><tspan class="kw">true</tspan><tspan class="pu"> })</tspan></text>
    <text x="472" y="902" class="mono code"><tspan class="kw">await</tspan><tspan class="fn"> ship</tspan><tspan class="pu">(service, { </tspan><tspan class="var">zeroTrust</tspan><tspan class="pu">: </tspan><tspan class="kw">true</tspan><tspan class="pu"> })</tspan></text>
