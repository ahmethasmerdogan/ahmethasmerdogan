<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1540" width="1200" height="1540" role="img" aria-label="Ahmet Erdoğan — Full-Stack Engineer and Security Researcher">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07080f"/><stop offset="1" stop-color="#030409"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.3" fill="#ffffff" fill-opacity="0.035"/>
    </pattern>
    <radialGradient id="gBlue" cx="30%" cy="6%" r="60%"><stop offset="0" stop-color="#3b82f6" stop-opacity="0.30"/><stop offset="1" stop-color="#3b82f6" stop-opacity="0"/></radialGradient>
    <radialGradient id="gViolet" cx="82%" cy="60%" r="55%"><stop offset="0" stop-color="#8b5cf6" stop-opacity="0.18"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/></radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="0.5" stop-color="#3b82f6"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="0.5" stop-color="#3b82f6"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#12151f"/><stop offset="1" stop-color="#0b0d14"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d1019"/><stop offset="1" stop-color="#080a10"/></linearGradient>
    <linearGradient id="tBlue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1c3350"/><stop offset="1" stop-color="#101826"/></linearGradient>
    <linearGradient id="tMint" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#123a30"/><stop offset="1" stop-color="#0d1a17"/></linearGradient>
    <linearGradient id="tPurple" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2a1c40"/><stop offset="1" stop-color="#150f1f"/></linearGradient>
    <linearGradient id="fadeL" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#05060c"/><stop offset="1" stop-color="#05060c" stop-opacity="0"/></linearGradient>
    <linearGradient id="fadeR" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#05060c" stop-opacity="0"/><stop offset="1" stop-color="#05060c"/></linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
    <clipPath id="clip"><rect x="0" y="0" width="1200" height="1540" rx="40"/></clipPath>
    <clipPath id="mclip"><rect x="0" y="428" width="1200" height="84"/></clipPath>
    <style>
      text { font-family: -apple-system, 'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif; }
      .mono{ font-family: ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace; }
      .badge{ fill:#c7d2e5; font-size:13px; font-weight:600; letter-spacing:1.5px; }
      .name { fill:#f8fafc; font-size:90px; font-weight:700; letter-spacing:-3px; }
      .sub  { fill:#94a3b8; font-size:26px; font-weight:400; letter-spacing:-0.3px; }
      .btnT { fill:#ffffff; font-size:16px; font-weight:600; }
      .btnO { fill:#e2e8f0; font-size:16px; font-weight:600; }
      .pill { fill:#8b95a7; font-size:13.5px; font-weight:500; }
      .sec  { fill:#5b6472; font-size:13px; font-weight:600; letter-spacing:3px; }
      .ct   { fill:#f1f5f9; font-size:22px; font-weight:600; letter-spacing:-0.3px; }
      .cd   { fill:#8b95a7; font-size:14.5px; }
      .tag  { fill:#5b6472; font-size:13.5px; font-weight:500; }
      .more { fill:#60a5fa; font-size:13.5px; font-weight:600; }
      .code { font-size:15px; }
      .stat { fill:#f8fafc; font-size:54px; font-weight:700; letter-spacing:-2px; }
      .slab { fill:#8b95a7; font-size:14.5px; font-weight:500; }
      .quote{ fill:#94a3b8; font-size:22px; font-weight:400; }
      .icn  { fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <g clip-path="url(#clip)">
    <rect x="0" y="0" width="1200" height="1540" fill="url(#bg)"/>
    <rect x="0" y="0" width="1200" height="1540" fill="url(#dots)"/>
    <rect x="0" y="0" width="1200" height="1540" fill="url(#gBlue)"/>
    <rect x="0" y="0" width="1200" height="1540" fill="url(#gViolet)"/>
    <rect x="0" y="0.5" width="1200" height="1" fill="#ffffff" opacity="0.06"/>

    <!-- ===== HERO ===== -->
    <g transform="translate(600,88)">
      <rect x="-232" y="-19" width="464" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="url(#accent)" stroke-opacity="0.5" stroke-width="1"/>
      <circle cx="-206" cy="-2" r="4" fill="#38bdf8"/>
      <circle cx="-206" cy="-2" r="4" fill="#38bdf8" opacity="0.4"><animate attributeName="r" values="4;9;4" dur="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0;0.4" dur="2.6s" repeatCount="indefinite"/></circle>
      <text x="16" y="4" text-anchor="middle" class="badge">FULL-STACK ENGINEER × SECURITY RESEARCHER</text>
    </g>
    <text x="600" y="220" text-anchor="middle" class="name">Ahmet Erdoğan</text>
    <text x="600" y="286" text-anchor="middle" class="sub">Hızlı kur, önce kendin kır, <tspan fill="url(#accent)" font-weight="600">güvenle yayınla.</tspan></text>

    <!-- CTA buttons (görsel; gerçek linkler README'de) -->
    <g transform="translate(0,326)">
      <rect x="459" y="0" width="166" height="48" rx="24" fill="url(#btn)"/>
      <rect x="459" y="0" width="166" height="48" rx="24" fill="url(#btn)" filter="url(#soft)" opacity="0.5"/>
      <text x="542" y="30" text-anchor="middle" class="btnT">Portfolio ↗</text>
      <rect x="641" y="0" width="120" height="48" rx="24" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="701" y="30" text-anchor="middle" class="btnO">GitHub</text>
    </g>

    <!-- ===== TECH MARQUEE ===== -->
    <g clip-path="url(#mclip)">
      <g>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="-1540 0" dur="26s" repeatCount="indefinite"/>
        <g id="pillrow">
          <g class="p"><rect x="0"    y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="60"    y="475" text-anchor="middle" class="pill">Python</text></g>
          <g class="p"><rect x="140"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="200"   y="475" text-anchor="middle" class="pill">TypeScript</text></g>
          <g class="p"><rect x="280"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="340"   y="475" text-anchor="middle" class="pill">Kotlin</text></g>
          <g class="p"><rect x="420"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="480"   y="475" text-anchor="middle" class="pill">FastAPI</text></g>
          <g class="p"><rect x="560"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="620"   y="475" text-anchor="middle" class="pill">Next.js</text></g>
          <g class="p"><rect x="700"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="760"   y="475" text-anchor="middle" class="pill">React</text></g>
          <g class="p"><rect x="840"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="900"   y="475" text-anchor="middle" class="pill">PostgreSQL</text></g>
          <g class="p"><rect x="980"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="1040"  y="475" text-anchor="middle" class="pill">Docker</text></g>
          <g class="p"><rect x="1120" y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="1180"  y="475" text-anchor="middle" class="pill">Kali</text></g>
          <g class="p"><rect x="1260" y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="1320"  y="475" text-anchor="middle" class="pill">Burp Suite</text></g>
          <g class="p"><rect x="1400" y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="1460"  y="475" text-anchor="middle" class="pill">Nmap</text></g>
        </g>
        <g transform="translate(1540,0)">
          <g class="p"><rect x="0"    y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="60"    y="475" text-anchor="middle" class="pill">Python</text></g>
          <g class="p"><rect x="140"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="200"   y="475" text-anchor="middle" class="pill">TypeScript</text></g>
          <g class="p"><rect x="280"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="340"   y="475" text-anchor="middle" class="pill">Kotlin</text></g>
          <g class="p"><rect x="420"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="480"   y="475" text-anchor="middle" class="pill">FastAPI</text></g>
          <g class="p"><rect x="560"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="620"   y="475" text-anchor="middle" class="pill">Next.js</text></g>
          <g class="p"><rect x="700"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="760"   y="475" text-anchor="middle" class="pill">React</text></g>
          <g class="p"><rect x="840"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="900"   y="475" text-anchor="middle" class="pill">PostgreSQL</text></g>
          <g class="p"><rect x="980"  y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="1040"  y="475" text-anchor="middle" class="pill">Docker</text></g>
          <g class="p"><rect x="1120" y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="1180"  y="475" text-anchor="middle" class="pill">Kali</text></g>
          <g class="p"><rect x="1260" y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="1320"  y="475" text-anchor="middle" class="pill">Burp Suite</text></g>
          <g class="p"><rect x="1400" y="450" width="120" height="40" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/><text x="1460"  y="475" text-anchor="middle" class="pill">Nmap</text></g>
        </g>
      </g>
    </g>
    <rect x="0" y="428" width="150" height="84" fill="url(#fadeL)"/>
    <rect x="1050" y="428" width="150" height="84" fill="url(#fadeR)"/>

    <!-- ===== WHAT I DO ===== -->
    <text x="600" y="584" text-anchor="middle" class="sec">WHAT I DO</text>

    <rect x="80" y="612" width="333" height="250" rx="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="81" y="613" width="331" height="1" fill="#ffffff" opacity="0.05"/>
    <rect x="112" y="642" width="52" height="52" rx="14" fill="url(#tBlue)" stroke="#ffffff" stroke-opacity="0.09"/>
    <g transform="translate(138,668)" class="icn" stroke="#4aa3ff"><path d="M -4,-8 L -12,0 L -4,8"/><path d="M 5,-8 L 13,0 L 5,8"/><path d="M -1.5,9 L 1.5,-9"/></g>
    <text x="112" y="736" class="ct">Engineering</text>
    <text x="112" y="768" class="cd">Event-driven SaaS ve kurumsal</text>
    <text x="112" y="790" class="cd">platformlar.</text>
    <text x="112" y="828" class="more">FastAPI · Next.js · Laravel →</text>

    <rect x="433" y="612" width="333" height="250" rx="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="434" y="613" width="331" height="1" fill="#ffffff" opacity="0.05"/>
    <rect x="465" y="642" width="52" height="52" rx="14" fill="url(#tMint)" stroke="#ffffff" stroke-opacity="0.09"/>
    <g transform="translate(491,668)" class="icn" stroke="#3fd98a"><path d="M 0,-12 L 11,-7 L 11,0 C 11,7 6,11 0,14 C -6,11 -11,7 -11,0 L -11,-7 Z"/><path d="M -4.5,0 L -1,3.5 L 5,-4"/></g>
    <text x="465" y="736" class="ct">Security</text>
    <text x="465" y="768" class="cd">Web &amp; app pentest, threat</text>
    <text x="465" y="790" class="cd">modeling &amp; exploitation.</text>
    <text x="465" y="828" class="more">Secure-by-design →</text>

    <rect x="786" y="612" width="334" height="250" rx="22" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="787" y="613" width="332" height="1" fill="#ffffff" opacity="0.05"/>
    <rect x="818" y="642" width="52" height="52" rx="14" fill="url(#tPurple)" stroke="#ffffff" stroke-opacity="0.09"/>
    <g transform="translate(844,668)" class="icn" stroke="#b98cf9"><path d="M 0,-11 L 12,-4 L 0,3 L -12,-4 Z"/><path d="M -12,1 L 0,8 L 12,1"/><path d="M -12,6 L 0,13 L 12,6"/></g>
    <text x="818" y="736" class="ct">Systems</text>
    <text x="818" y="768" class="cd">Quant &amp; trading altyapıları,</text>
    <text x="818" y="790" class="cd">ölçeklenebilir servisler.</text>
    <text x="818" y="828" class="more">Observability · scale →</text>

    <!-- ===== IN PRACTICE (code + border beam) ===== -->
    <text x="600" y="932" text-anchor="middle" class="sec">IN PRACTICE</text>
    <rect x="80" y="962" width="1040" height="278" rx="18" fill="url(#panel)"/>
    <!-- animated border beam -->
    <rect x="80" y="962" width="1040" height="278" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="80" y="962" width="1040" height="278" rx="18" fill="none" stroke="url(#beam)" stroke-width="2" pathLength="1000" stroke-dasharray="140 860" filter="url(#soft)">
      <animate attributeName="stroke-dashoffset" from="0" to="-1000" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="80" y="962" width="1040" height="278" rx="18" fill="none" stroke="url(#beam)" stroke-width="1.6" pathLength="1000" stroke-dasharray="140 860">
      <animate attributeName="stroke-dashoffset" from="0" to="-1000" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <!-- editor chrome -->
    <circle cx="112" cy="992" r="5.5" fill="#ff5f56"/><circle cx="132" cy="992" r="5.5" fill="#ffbd2e"/><circle cx="152" cy="992" r="5.5" fill="#27c93f"/>
    <text x="600" y="997" text-anchor="middle" class="mono" font-size="13" fill="#5b6472">pipeline.sh</text>
    <circle cx="1058" cy="992" r="4" fill="#3fd98a"/><text x="1070" y="996" class="mono" font-size="12" fill="#3fd98a">secure</text>
    <line x1="80" y1="1016" x2="1120" y2="1016" stroke="#ffffff" stroke-opacity="0.07"/>
    <!-- code / log -->
    <text x="116" y="1058" class="mono code"><tspan fill="#7ee787">$</tspan><tspan fill="#82aaff"> ahmet</tspan><tspan fill="#e5e7eb"> deploy</tspan><tspan fill="#c792ea"> --zero-trust --owasp</tspan></text>
    <text x="116" y="1096" class="mono code"><tspan fill="#5b6472">[12:04:01]</tspan><tspan fill="#38bdf8">  INFO </tspan><tspan fill="#8b95a7">  building event-driven services…</tspan></text>
    <text x="116" y="1130" class="mono code"><tspan fill="#5b6472">[12:04:03]</tspan><tspan fill="#3fd98a">  PASS </tspan><tspan fill="#cdd3de">  threat model verified</tspan></text>
    <text x="116" y="1164" class="mono code"><tspan fill="#5b6472">[12:04:04]</tspan><tspan fill="#3fd98a">  PASS </tspan><tspan fill="#cdd3de">  0 critical · 0 high findings</tspan></text>
    <text x="116" y="1198" class="mono code"><tspan fill="#5b6472">[12:04:05]</tspan><tspan fill="#82aaff">  READY</tspan><tspan fill="#cdd3de">  deployed to production ✓</tspan></text>
    <rect x="470" y="1186" width="9" height="16" fill="#7ee787"><animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></rect>

    <!-- ===== STATS (GitHub'dan çekilen gerçek veriler) ===== -->
    <line x1="340" y1="1316" x2="340" y2="1392" stroke="#ffffff" stroke-opacity="0.08"/>
    <line x1="600" y1="1316" x2="600" y2="1392" stroke="#ffffff" stroke-opacity="0.08"/>
    <line x1="860" y1="1316" x2="860" y2="1392" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="210" y="1362" text-anchor="middle" class="stat">6<tspan fill="url(#accent)">+</tspan></text>
    <text x="210" y="1392" text-anchor="middle" class="slab">yıl GitHub'da</text>
    <text x="470" y="1362" text-anchor="middle" class="stat">8</text>
    <text x="470" y="1392" text-anchor="middle" class="slab">açık repo</text>
    <text x="730" y="1362" text-anchor="middle" class="stat">9</text>
    <text x="730" y="1392" text-anchor="middle" class="slab">farklı dil</text>
    <text x="990" y="1362" text-anchor="middle" class="stat" fill="url(#accent)">∞</text>
    <text x="990" y="1392" text-anchor="middle" class="slab">threat model</text>

    <!-- ===== CLOSING ===== -->
    <rect x="570" y="1458" width="60" height="3" rx="1.5" fill="url(#accent)"/>
    <text x="600" y="1508" text-anchor="middle" class="quote">Güvenlik sonradan bir katman değil, <tspan fill="#f1f5f9">tasarımın ilk kararıdır.</tspan></text>
  </g>
</svg>
