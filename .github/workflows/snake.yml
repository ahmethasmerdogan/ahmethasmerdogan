name: generate-snake

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ahmethasmerdogan
          outputs: |
            dist/github-snake.svg?color_snake=%2300ff9f&color_dots=%230a0e12,%231a7f4f,%232ea043,%2339ff14,%23ccffe0
            dist/github-snake-dark.svg?color_snake=%2300ff9f&color_dots=%230a0e12,%23145c37,%231f8f4d,%2300ff9f,%23ccffe0

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
