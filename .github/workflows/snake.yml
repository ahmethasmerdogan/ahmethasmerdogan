name: generate-snake

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ahmethasmerdogan
          outputs: |
            dist/github-snake.svg?color_snake=%2300fff9&color_dots=%230d0221,%237b2ff7,%23ff2e97,%2300fff9,%23f0f0f0
            dist/github-snake-dark.svg?color_snake=%2300fff9&color_dots=%230d0221,%233b0f6f,%237b2ff7,%23ff2e97,%2300fff9

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
