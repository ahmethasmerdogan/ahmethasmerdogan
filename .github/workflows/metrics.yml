name: metrics

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ahmethasmerdogan
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories
          config_timezone: Europe/Istanbul
          config_animations: yes
          config_padding: 6%
          config_display: large

          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: 00ff9f, ffb000, 39ff14, 1f8f4d, 8b949e, 2ea043, 3fb07a, c9d1d9

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          extras_css: >
            .background { fill: #0a0e12 !important; }
            svg { color: #8b949e; }
            h1, h2, h3 { color: #00ff9f !important; }
            h2 svg { fill: #00ff9f !important; }
            a, a * { color: #00ff9f !important; }
            .field a { color: #00ff9f !important; }
            rect[stroke="#eaecef"], rect[stroke="#e1e4e8"] { stroke: #1a7f4f !important; }
            .contrib-legend, .calendar text { fill: #8b949e !important; }
